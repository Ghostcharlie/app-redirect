<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Get the app</title>
</head>
<body>
  <script>
    var APP_STORE  = "https://apps.apple.com/sa/app/get-set-grow-app/id6749352251";
    var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.lkpsec.getsetgrowapp&hl=en_IN";
    var FALLBACK   = PLAY_STORE; // desktop / anything else

    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
    var isAndroid = /android/i.test(ua);

    var target = isIOS ? APP_STORE : (isAndroid ? PLAY_STORE : FALLBACK);
    window.location.replace(target);

    document.addEventListener("DOMContentLoaded", function () {
      var a = document.getElementById("manual");
      if (a) a.href = target;
    });
  </script>
  <p>If nothing happens, <a id="manual" href="#">tap here</a>.</p>
</body>
</html>
